<svg viewBox="0 0 480 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Documento profissional com selo de verificação e brilho">
  <defs>
    <linearGradient id="pf-bg" x1="0" y1="0" x2="480" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFEAFD"/>
      <stop offset="1" stop-color="#FBFAFE"/>
    </linearGradient>
    <linearGradient id="pf-brand" x1="190" y1="50" x2="310" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.6" stop-color="#6018C8"/>
      <stop offset="1" stop-color="#A445D8"/>
    </linearGradient>
    <radialGradient id="pf-badge" cx="0.5" cy="0.4" r="0.7">
      <stop stop-color="#A445D8"/>
      <stop offset="0.6" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#581088"/>
    </radialGradient>
    <pattern id="pf-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.6" fill="#7C3AED" fill-opacity="0.10"/>
    </pattern>
    <filter id="pf-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="240" rx="20" fill="url(#pf-bg)"/>
  <rect width="480" height="240" rx="20" fill="url(#pf-dots)"/>
  <circle cx="248" cy="120" r="116" fill="#A445D8" fill-opacity="0.06"/>

  <!-- back document (tilted) -->
  <g transform="rotate(-7 240 124)">
    <rect x="178" y="58" width="124" height="148" rx="14" fill="#fff" stroke="#E4DCFB" stroke-width="2"/>
  </g>

  <!-- front document -->
  <g transform="rotate(5 240 124)">
    <rect x="186" y="62" width="124" height="148" rx="14" fill="#FFFFFF" stroke="url(#pf-brand)" stroke-width="2.2"/>
    <rect x="186" y="62" width="124" height="34" rx="14" fill="url(#pf-brand)"/>
    <rect x="186" y="84" width="124" height="12" fill="url(#pf-brand)"/>
    <g stroke="#C4B5FD" stroke-width="4" stroke-linecap="round">
      <path d="M204 118 H292"/>
      <path d="M204 134 H292"/>
      <path d="M204 150 H264"/>
    </g>
    <g stroke="#E4DCFB" stroke-width="4" stroke-linecap="round">
      <path d="M204 168 H292"/>
      <path d="M204 184 H248"/>
    </g>
  </g>

  <!-- verified badge -->
  <g filter="url(#pf-glow)" transform="translate(316 158)">
    <circle r="30" fill="url(#pf-badge)"/>
    <circle r="37" fill="none" stroke="#A445D8" stroke-width="1.4" stroke-opacity="0.4"/>
    <path d="M-13 1 L-4 11 L14 -10" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- sparkles -->
  <g fill="#A445D8">
    <path d="M150 70 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 z" fill-opacity="0.8"/>
    <path d="M360 70 l2 5 l5 2 l-5 2 l-2 5 l-2 -5 l-5 -2 l5 -2 z" fill-opacity="0.55"/>
  </g>
</svg>
