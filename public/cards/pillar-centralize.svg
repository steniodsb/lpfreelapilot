<svg viewBox="0 0 480 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vários nós conectados convergindo para um núcleo central">
  <defs>
    <linearGradient id="cz-bg" x1="0" y1="0" x2="480" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFEAFD"/>
      <stop offset="1" stop-color="#FBFAFE"/>
    </linearGradient>
    <linearGradient id="cz-brand" x1="180" y1="70" x2="300" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.6" stop-color="#6018C8"/>
      <stop offset="1" stop-color="#A445D8"/>
    </linearGradient>
    <radialGradient id="cz-core" cx="0.5" cy="0.45" r="0.65">
      <stop stop-color="#A445D8"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#581088"/>
    </radialGradient>
    <pattern id="cz-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.6" fill="#7C3AED" fill-opacity="0.10"/>
    </pattern>
    <filter id="cz-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="240" rx="20" fill="url(#cz-bg)"/>
  <rect width="480" height="240" rx="20" fill="url(#cz-dots)"/>
  <circle cx="240" cy="118" r="120" fill="#A445D8" fill-opacity="0.06"/>

  <!-- connecting lines -->
  <g stroke="url(#cz-brand)" stroke-width="2" stroke-opacity="0.55" stroke-linecap="round">
    <path d="M240 118 L96 56"/>
    <path d="M240 118 L388 52"/>
    <path d="M240 118 L70 150"/>
    <path d="M240 118 L410 158"/>
    <path d="M240 118 L150 200"/>
    <path d="M240 118 L330 198"/>
  </g>

  <!-- satellite nodes -->
  <g>
    <g transform="translate(96 56)"><circle r="13" fill="#fff"/><circle r="13" fill="none" stroke="url(#cz-brand)" stroke-width="2"/><circle r="4.5" fill="#7C3AED"/></g>
    <g transform="translate(388 52)"><circle r="11" fill="#fff"/><circle r="11" fill="none" stroke="url(#cz-brand)" stroke-width="2"/><circle r="4" fill="#A445D8"/></g>
    <g transform="translate(70 150)"><circle r="11" fill="#fff"/><circle r="11" fill="none" stroke="url(#cz-brand)" stroke-width="2"/><circle r="4" fill="#A445D8"/></g>
    <g transform="translate(410 158)"><circle r="13" fill="#fff"/><circle r="13" fill="none" stroke="url(#cz-brand)" stroke-width="2"/><circle r="4.5" fill="#7C3AED"/></g>
    <g transform="translate(150 200)"><circle r="10" fill="#fff"/><circle r="10" fill="none" stroke="url(#cz-brand)" stroke-width="2"/><circle r="3.5" fill="#A445D8"/></g>
    <g transform="translate(330 198)"><circle r="11" fill="#fff"/><circle r="11" fill="none" stroke="url(#cz-brand)" stroke-width="2"/><circle r="4" fill="#7C3AED"/></g>
  </g>

  <!-- central hub -->
  <g filter="url(#cz-glow)">
    <circle cx="240" cy="118" r="30" fill="url(#cz-core)"/>
    <circle cx="240" cy="118" r="38" fill="none" stroke="#A445D8" stroke-width="1.5" stroke-opacity="0.45"/>
    <circle cx="240" cy="118" r="46" fill="none" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.22"/>
    <!-- layers glyph -->
    <g stroke="#fff" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" fill="none">
      <path d="M240 104 L255 112 L240 120 L225 112 Z"/>
      <path d="M227 118 L240 125.5 L253 118"/>
      <path d="M227 124.5 L240 132 L253 124.5"/>
    </g>
  </g>
</svg>
